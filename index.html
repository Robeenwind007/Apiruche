    + '<input type="number" id="f-prod-poids-ref" placeholder="ex: 42.0" step="0.1" min="0"></div>'
    + '</div>'

    + '<div id="prod-ref-hint" style="font-size:11px;color:var(--gold);padding:6px 0;display:none"></div>'

    + '<button class="btn btn-primary btn-full" onclick="savePoseHausse()">💾 Poser la hausse</button>'
    + '</div>';

  // Pré-remplir la colonie et le poids dès l'affichage (premier item sélectionné par défaut)
  setTimeout(updatePoidsRefHausse, 50);
}

function updatePoidsRefHausse() {
  const rucheId = document.getElementById('f-prod-ruche')?.value;
  if (!rucheId) return;
  // Remplir le champ colonie depuis DB.colonies
  const colonieEl = document.getElementById('f-prod-colonie');
  if (colonieEl) {
    const occ = DB.occupation_courante.find(o => o.ruche_id === rucheId);
    const col = occ ? DB.colonies.find(c => c.id === occ.colonie_id) : null;
    colonieEl.value = col ? (col.nom || '—') : '—';
  }
  // Poids de référence = poids_ref de la 1ère hausse posée sur cette ruche (la plus ancienne)
  // Sinon pré-remplir depuis la dernière pesée
  const hint = document.getElementById('prod-ref-hint');
  const premiereHausse = (DB.hausses || [])
    .filter(h => h.ruche_id === rucheId && h.poids_ref)
    .sort((a,b) => new Date(a.date_pose) - new Date(b.date_pose))[0];
  if (premiereHausse) {
    document.getElementById('f-prod-poids-ref').value = parseFloat(premiereHausse.poids_ref).toFixed(1);
    if (hint) { hint.textContent = '✓ Poids de référence initial (pose du ' + fmtDate(premiereHausse.date_pose) + ')'; hint.style.display = 'block'; }
  } else {
    const pesee = dernierePesee(rucheId);
    if (pesee) {
      const poids = parseFloat(calculerPesee(pesee));
      if (!isNaN(poids)) {
        document.getElementById('f-prod-poids-ref').value = poids.toFixed(1);
        if (hint) { hint.textContent = '✓ Pré-rempli depuis la dernière pesée du ' + fmtDate(pesee.semaine); hint.style.display = 'block'; }
      }
    } else {
      if (hint) { hint.textContent = 'Aucune pesée récente — saisir manuellement'; hint.style.display = 'block'; }
    }
  }
}


async function deleteHausse(hausseId) {
  const cfg = getConfig();
  const h = (DB.hausses || []).find(x => x.id === hausseId);
  if (!h) return;
  showConfirm('Supprimer la hausse ' + h.hausse_ref + ' sur ' + h.ruche_id + ' ?', async () => {
    try {
      const r = await fetch(cfg.url + '/rest/v1/hausses?id=eq.' + hausseId, {
        method: 'DELETE',
        headers: { apikey: cfg.key, Authorization: 'Bearer ' + cfg.key }
      });
      if (!r.ok) throw new Error(await r.text());
      DB.hausses = DB.hausses.filter(x => x.id !== hausseId);
      saveCache();
      toast('Hausse supprimée', 'ok');
      addLog('DELETE', 'hausses', `${h.hausse_ref} sur ${h.ruche_id}`);
      renderProduction();
    } catch(e) { toast('Erreur : ' + e.message, 'err'); }
  });
}

async function savePoseHausse() {
  const cfg = getConfig();
  if (!cfg.url || !cfg.key) { toast('Configurez Supabase d\'abord', 'err'); return; }
  const hausse_ref = document.getElementById('f-prod-hausse')?.value;
  const ruche_id   = document.getElementById('f-prod-ruche')?.value;
  const date_pose  = document.getElementById('f-prod-date')?.value;
  const poids_ref  = parseFloat(document.getElementById('f-prod-poids-ref')?.value);
  const variete    = null;
  const occ = DB.occupation_courante.find(o => o.ruche_id === ruche_id);

  if (!hausse_ref || !ruche_id || !date_pose) { toast('Remplissez les champs obligatoires', 'err'); return; }
  if (isNaN(poids_ref)) { toast('Poids de référence requis', 'err'); return; }

  const record = {
    id: genId(), hausse_ref, ruche_id,
    colonie_id: occ?.colonie_id || null,
    date_pose, poids_ref, variete,
    date_retrait: null, poids_retrait: null, poids_miel: null
  };

  try {
    const r = await fetch(cfg.url + '/rest/v1/hausses', {
      method: 'POST',
      headers: { apikey: cfg.key, Authorization: 'Bearer ' + cfg.key, 'Content-Type': 'application/json', Prefer: 'return=minimal' },
      body: JSON.stringify(record)
    });
    if (!r.ok) throw new Error(await r.text());
    if (!DB.hausses) DB.hausses = [];
    DB.hausses.unshift(record);
    saveCache();
    toast('Hausse ' + hausse_ref + ' posée sur ' + ruche_id + ' ✓', 'ok');
    addLog('CREATE', 'hausses', `${hausse_ref} posée sur ${ruche_id} · ${date_pose} · réf ${poids_ref} kg`);
    renderProduction();
  } catch(e) { toast('Erreur : ' + e.message, 'err'); }
}

    + '<div class="form-title" style="margin:0">🍯 Retirer la hausse</div>'
    + '</div>'

    // Récap hausse
    + '<div style="background:rgba(200,168,75,.08);border-radius:12px;padding:12px;margin-bottom:14px">'

    + '<div style="font-size:11px;color:var(--text-muted)">Posée le ' + fmtDate(h.date_pose)
      + (occ ? ' · ' + (occ.colonie_nom || 'Colonie') : '') + '</div>'
    + '<div style="font-size:11px;color:var(--text-muted)">Poids de référence : ' + parseFloat(h.poids_ref).toFixed(1) + ' kg</div>'
    + '</div>'
    + (mielsActif !== null ? '<div style="text-align:right"><div style="font-family:DM Serif Display,serif;font-size:22px;color:var(--gold)">~' + mielsActif + ' kg</div><div style="font-size:10px;color:var(--text-muted)">miel estimé</div></div>' : '')
    + '</div></div>'

    + '<div class="form-row">'
    + '<div class="form-group"><label class="field-label">Date de retrait</label>'
    + '<input type="date" id="f-retrait-date" value="' + todayISO() + '"></div>'
    + '<div class="form-group"><label class="field-label">Poids ruche au retrait (kg)</label>'
    + '<input type="number" id="f-retrait-poids" placeholder="ex: 38.5" step="0.1" min="0"'
    + (dernPoids !== null ? ' value="' + dernPoids.toFixed(1) + '"' : '') + ' oninput="calcMielRetrait()"></div>'
    + '</div>'

    + '<div id="retrait-miel-calc" style="text-align:center;padding:10px;border-radius:10px;background:rgba(200,168,75,.08);margin-bottom:12px;display:none">'
    + '<div style="font-size:11px;color:var(--text-muted)">Miel récolté</div>'
    + '<div id="retrait-miel-val" style="font-family:DM Serif Display,serif;font-size:28px;font-weight:600;color:var(--gold)">— kg</div>'
    + '</div>'

    + '<div class="form-row full"><div class="form-group"><label class="field-label">Variété de miel</label>'
    + '<select id="f-retrait-variete"><option value="">— Non définie —</option>'
    + getListes().variete_miel.map(v => '<option' + (h.variete === v ? ' selected' : '') + '>' + v + '</option>').join('')
    + '</select></div></div>'

    + '<div class="form-row full"><div class="form-group"><label class="field-label">Notes</label>'
    + '<input type="text" id="f-retrait-notes" placeholder="Qualité, observations..." value="' + (h.notes || '') + '"></div></div>'

    + '<button class="btn btn-primary btn-full" onclick="saveRetraitHausse(\'' + hausseId + '\')">✅ Confirmer la récolte</button>'
    + '</div>';

  setTimeout(calcMielRetrait, 50);

function calcMielRetrait() {
  const pRetraitEl = document.getElementById('f-retrait-poids');
  const calcEl = document.getElementById('retrait-miel-calc');
  const valEl  = document.getElementById('retrait-miel-val');
  const h = (DB.hausses || []).find(x => !x.date_retrait && document.getElementById('content-production')?.innerHTML.includes(x.id));

  if (!pRetraitEl || !calcEl || !valEl) return;
  const pRetrait = parseFloat(pRetraitEl.value);

  // Trouver la hausse active affichée (celle dont le formulaire est ouvert)
  const allActive = (DB.hausses || []).filter(x => !x.date_retrait);
  const hausseId = document.querySelector('[onclick*="saveRetraitHausse"]')
    ?.getAttribute('onclick')?.match(/'([^']+)'/)?.[1];
  const hausse = (DB.hausses || []).find(x => x.id === hausseId);

  if (!hausse || isNaN(pRetrait)) { calcEl.style.display = 'none'; return; }
  const autresRetrait = (DB.hausses || [])
    .filter(x => x.id !== hausse.id && x.ruche_id === hausse.ruche_id && x.date_retrait && x.date_retrait >= hausse.date_pose && x.poids_miel)
    .reduce((s, x) => s + parseFloat(x.poids_miel), 0);
  const miel = Math.max(0, pRetrait - parseFloat(hausse.poids_ref) - autresRetrait);
  calcEl.style.display = 'block';
  valEl.textContent = miel.toFixed(1) + ' kg';
  valEl.style.color = miel >= 5 ? '#7ab85a' : miel >= 2 ? '#e08020' : 'var(--text-muted)';
}

async function saveRetraitHausse(hausseId) {
  const cfg = getConfig();
  if (!cfg.url || !cfg.key) { toast('Configurez Supabase d\'abord', 'err'); return; }
  const h = (DB.hausses || []).find(x => x.id === hausseId);
  if (!h) return;

  const date_retrait  = document.getElementById('f-retrait-date')?.value;
  const poids_retrait = parseFloat(document.getElementById('f-retrait-poids')?.value);
  const variete       = document.getElementById('f-retrait-variete')?.value || null;
  const notes         = document.getElementById('f-retrait-notes')?.value || null;

  if (!date_retrait)      { toast('Date de retrait requise', 'err'); return; }
  if (isNaN(poids_retrait)) { toast('Poids au retrait requis', 'err'); return; }

  const autresRetraitSave = (DB.hausses || [])
    .filter(x => x.id !== h.id && x.ruche_id === h.ruche_id && x.date_retrait && x.date_retrait >= h.date_pose && x.poids_miel)
    .reduce((s, x) => s + parseFloat(x.poids_miel), 0);
  const poids_miel = Math.max(0, poids_retrait - parseFloat(h.poids_ref) - autresRetraitSave);
  const update = { date_retrait, poids_retrait, poids_miel: parseFloat(poids_miel.toFixed(2)), variete, notes };

  showConfirm('Confirmer la récolte de ' + poids_miel.toFixed(1) + ' kg de miel pour la hausse ' + h.hausse_ref + ' ?', async () => {
    try {
      const r = await fetch(cfg.url + '/rest/v1/hausses?id=eq.' + hausseId, {
        method: 'PATCH',
        headers: { apikey: cfg.key, Authorization: 'Bearer ' + cfg.key, 'Content-Type': 'application/json', Prefer: 'return=minimal' },
        body: JSON.stringify(update)
      });
      if (!r.ok) throw new Error(await r.text());
      Object.assign(h, update);
      saveCache();
      toast('Récolte de ' + poids_miel.toFixed(1) + ' kg enregistrée ✓', 'ok');
      addLog('UPDATE', 'hausses', `${h.hausse_ref} retirée de ${h.ruche_id} · ${poids_miel.toFixed(1)} kg · ${variete||'variété ?'}`);
      renderProduction();
    } catch(e) { toast('Erreur : ' + e.message, 'err'); }
  });
}

        ico.style.borderColor = 'var(--gold)';

function toggleAllRuchesAction(check) {
  document.querySelectorAll('#actions-ruches-list [data-ruche]').forEach(card => {
    const ico = card.querySelector('.action-cb-ico');
    card.dataset.selected = check ? '1' : '0';
    if (check) {
      card.style.borderColor = 'var(--gold)';
      card.style.background = 'rgba(200,168,75,.12)';
      card.style.color = 'var(--text)';
      if (ico) { ico.style.background = 'var(--gold)'; ico.style.borderColor = 'var(--gold)'; ico.textContent = '✓'; ico.style.color = '#000'; }
    } else {
      card.style.borderColor = 'var(--border-soft)';
      card.style.background = 'transparent';
      card.style.color = 'var(--text-muted)';
      if (ico) { ico.style.background = 'transparent'; ico.style.borderColor = 'var(--border)'; ico.textContent = ''; }
    }
  });
}

async function saveAction() {
  const cfg = getConfig();
  if (!cfg.url || !cfg.key) { toast('Configurez Supabase d\'abord', 'err'); showSettings(); return; }
  const semaine  = document.getElementById('f-actions-date')?.value;
  const action   = document.getElementById('f-actions-action')?.value;
  const selected = [...document.querySelectorAll('#actions-ruches-list [data-ruche][data-selected="1"]')];
  if (!semaine)         { toast('Date requise', 'err'); return; }
  if (!selected.length) { toast('Sélectionnez au moins une ruche', 'err'); return; }

  const records = selected.map(card => {
    const rucheId = card.dataset.ruche;
    const occ = DB.occupation_courante.find(o => o.ruche_id === rucheId);
    return { id: genId(), ruche_id: rucheId, colonie_id: occ?.colonie_id || null, semaine, action };
  });

  try {
    const r = await fetch(cfg.url + '/rest/v1/actions', {
      method: 'POST',
      headers: { apikey: cfg.key, Authorization: 'Bearer ' + cfg.key, 'Content-Type': 'application/json', Prefer: 'return=minimal' },
      body: JSON.stringify(records)
    });
    if (!r.ok) throw new Error(await r.text());
    records.forEach(rec => DB.actions.unshift(rec));
    saveCache();
    toast(records.length > 1 ? records.length + ' actions enregistrées ✓' : 'Action enregistrée ✓', 'ok');
    addLog('CREATE', 'actions', `${action} · ${records.length} ruche(s) · ${semaine}`);
    // Décocher toutes les ruches après succès
    toggleAllRuchesAction(false);
    renderActionsScreen();
  } catch(e) { toast('Erreur : ' + e.message, 'err'); }
}

function deleteAction(actionId, returnScreen, returnId) {
  showConfirm('Supprimer cette action ?', async () => {
    const cfg = getConfig();
    if (!cfg.url || !cfg.key) { toast('Configurez Supabase d\'abord', 'err'); return; }
    try {
      const r = await fetch(`${cfg.url}/rest/v1/actions?id=eq.${actionId}`, {
        method: 'DELETE',
        headers: { apikey: cfg.key, Authorization: `Bearer ${cfg.key}`, Prefer: 'return=minimal' }
      });
      if (!r.ok) throw new Error(await r.text());
      DB.actions = DB.actions.filter(a => a.id !== actionId);
      saveCache();
      toast('Action supprimée', 'ok');
      addLog('DELETE', 'actions', `id:${actionId}`);
      if (returnScreen === 'actions') renderActionsScreen();
      else navigate(returnScreen, null, true, returnId);
    } catch(e) { toast('Erreur : ' + e.message, 'err'); }
  }, 'Supprimer');
}

// --- RÉCOLTE ---
function renderRecolte() {
  const el = document.getElementById('content-recolte');
  const annee = new Date().getFullYear();
  const anneeStr = annee.toString();

  // Récoltes table recoltes (ancien module)
  const recolteAnnee = DB.recoltes.filter(r => r.semaine && r.semaine.startsWith(anneeStr));
  const totalRecoltes = recolteAnnee.reduce((s,r) => s + (parseFloat(r.poids_miel)||0), 0);

  // Récoltes issues des hausses retirées (module Production)
  const haussesRetirees = (DB.hausses || []).filter(h => h.date_retrait && h.date_retrait.startsWith(anneeStr) && h.poids_miel);
  const totalHausses = haussesRetirees.reduce((s,h) => s + (parseFloat(h.poids_miel)||0), 0);

  const totalAnnee = (totalRecoltes + totalHausses).toFixed(1);

  // Construire liste unifiée triée par date décroissante
  const lignes = [
    ...recolteAnnee.map(r => ({ date: r.semaine, ruche_id: r.ruche_id, poids: parseFloat(r.poids_miel)||0, source: 'recolte', variete: r.variete || null })),
    ...haussesRetirees.map(h => {
      const ruche = DB.ruches.find(r => r.id === h.ruche_id);
      return { date: h.date_retrait, ruche_id: h.ruche_id, ruche_nom: ruche?.nom || null, poids: parseFloat(h.poids_miel)||0, source: 'hausse', hausse_ref: h.hausse_ref, variete: h.variete || null };
    })
  ].sort((a,b) => new Date(b.date) - new Date(a.date));

  el.innerHTML = `
    <div class="form-card">
      <div class="form-title">🍯 Récolte ${annee}</div>
      <div style="display:flex;align-items:baseline;gap:8px;margin-bottom:16px">
        <span style="font-family:'DM Serif Display',serif;font-size:36px;font-weight:600;color:var(--gold-light)">${totalAnnee}</span>
        <span style="color:var(--text-dim);font-size:14px">kg récoltés cette année</span>
      </div>
      ${totalHausses > 0 && totalRecoltes > 0 ? `
      <div style="display:flex;gap:10px;margin-bottom:14px">
        <div style="flex:1;background:rgba(200,168,75,.07);border-radius:8px;padding:8px 10px;text-align:center">
          <div style="font-family:'DM Serif Display',serif;font-size:16px;color:var(--gold)">${totalHausses.toFixed(1)} kg</div>
          <div style="font-size:10px;color:var(--text-muted)">🍯 Hausses</div>
        </div>
        <div style="flex:1;background:rgba(200,168,75,.04);border-radius:8px;padding:8px 10px;text-align:center">
          <div style="font-family:'DM Serif Display',serif;font-size:16px;color:var(--gold-light)">${totalRecoltes.toFixed(1)} kg</div>
          <div style="font-size:10px;color:var(--text-muted)">📋 Récoltes</div>
        </div>
      </div>` : ''}
      <div style="margin-bottom:16px">
        ${lignes.map(l => {
          const rucheLabel = l.ruche_nom ? l.ruche_id + ' — ' + l.ruche_nom : l.ruche_id;
          const badge = l.source === 'hausse'
            ? '<span style="padding:1px 6px;border-radius:4px;background:rgba(200,168,75,.15);border:1px solid var(--gold);color:var(--gold);font-size:10px;font-weight:700">🍯 ' + l.hausse_ref + '</span>'
            : '<span style="padding:1px 6px;border-radius:4px;background:rgba(150,150,150,.1);border:1px solid var(--border);color:var(--text-muted);font-size:10px">📋</span>';
          return '<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border-soft);gap:8px">'
            + '<div style="display:flex;align-items:center;gap:7px;flex:1;min-width:0">'
            + badge
            + '<div>'
            + '<div style="font-size:12px;color:var(--text)">' + rucheLabel + '</div>'
            + '<div style="font-size:10px;color:var(--text-muted)">' + fmtDate(l.date) + (l.variete ? ' · ' + l.variete : '') + '</div>'
            + '</div></div>'
            + '<span style="font-family:DM Serif Display,serif;font-size:16px;color:var(--gold-light);flex-shrink:0">' + l.poids.toFixed(1) + ' kg</span>'
            + '</div>';
        }).join('') || '<div class="empty"><div class="empty-icon">🍯</div><div class="empty-text">Aucune récolte cette année</div></div>'}
      </div>
    </div>
    ${lignes.length >= 2 ? `<div class="form-card" style="margin-top:0" id="recolte-chart-card">
      <div class="form-title" style="margin-bottom:14px">📊 Comparaison par ruche</div>
      <canvas id="recolte-chart" style="width:100%;max-height:260px"></canvas>
    </div>` : ''}
  `;

  // Construire le graphique barre si au moins 2 entrées
  if (lignes.length >= 2) {
    // Agréger par ruche_id
    const parRuche = {};
    lignes.forEach(l => {
      if (!parRuche[l.ruche_id]) {
        const ruche = DB.ruches.find(r => r.id === l.ruche_id);
        const occ = DB.occupation_courante.find(o => o.ruche_id === l.ruche_id);
        const col = occ ? DB.colonies.find(c => c.id === occ.colonie_id) : null;
        parRuche[l.ruche_id] = {
          label: l.ruche_id + (ruche?.nom ? ' — ' + ruche.nom : '') + (col ? '\n' + col.nom : ''),
          total: 0
        };
      }
      parRuche[l.ruche_id].total += l.poids;
    });

    const entries = Object.values(parRuche).sort((a,b) => b.total - a.total);
    const labels  = entries.map(e => e.label);
    const values  = entries.map(e => parseFloat(e.total.toFixed(1)));
    const maxVal  = Math.max(...values);

    const canvas = document.getElementById('recolte-chart');
    if (canvas) {
      const ctx = canvas.getContext('2d');
      const dpr = window.devicePixelRatio || 1;
      const W = canvas.parentElement.clientWidth - 32;
      const barH = 36, gap = 10, padLeft = 0, padTop = 10, padBottom = 10;
      const chartH = entries.length * (barH + gap) + padTop + padBottom;
      canvas.width  = W * dpr;
      canvas.height = chartH * dpr;
      canvas.style.width  = W + 'px';
      canvas.style.height = chartH + 'px';
      ctx.scale(dpr, dpr);

      const gold = '#c8a84b', goldLight = '#e0c070', muted = '#6b6b4a', bg2 = '#1a1a12';

      entries.forEach((e, i) => {
        const y = padTop + i * (barH + gap);
        const barW = maxVal > 0 ? Math.round((e.total / maxVal) * (W - padLeft - 70)) : 0;

        // Fond barre
        ctx.fillStyle = bg2;
        ctx.beginPath();
        ctx.roundRect(padLeft, y + 18, W - padLeft - 70, 14, 4);
        ctx.fill();

        // Barre valeur
        if (barW > 0) {
          ctx.fillStyle = gold;
          ctx.beginPath();
          ctx.roundRect(padLeft, y + 18, barW, 14, 4);
          ctx.fill();
        }

        // Label ruche + colonie (deux lignes)
        const parts = e.label.split('\n');
        ctx.fillStyle = '#e8e0c8';
        ctx.font = '600 11px Inter, sans-serif';
        ctx.fillText(parts[0], padLeft, y + 12);
        if (parts[1]) {
          ctx.fillStyle = muted;
          ctx.font = '10px Inter, sans-serif';
          ctx.fillText(parts[1], padLeft, y + 13 + 11);
        }

        // Valeur à droite
        ctx.fillStyle = goldLight;
        ctx.font = '600 13px DM Serif Display, serif';
        ctx.textAlign = 'right';
        ctx.fillText(e.total.toFixed(1) + ' kg', W, y + 28);
        ctx.textAlign = 'left';
      });
    }
  }
}

async function saveAchat() {
  const cfg = getConfig();
  if (!cfg.url || !cfg.key) { toast('Configurez Supabase d\'abord', 'err'); showSettings(); return; }
  const record = {
    id: genId(),
    date:        document.getElementById('f-achats-date')?.value,
    fournisseur: document.getElementById('f-achats-fourn')?.value || null,
    type_achat:  document.getElementById('f-achats-type')?.value,
    montant_ttc: parseFloat(document.getElementById('f-achats-montant')?.value) || null
  };
  if (!record.date) { toast('Date obligatoire', 'err'); return; }
  await saveRecord('achats', record, 'Achat enregistré ✓');
  renderAchats();
}

  type_action:     ['Remérage','Division','Essaimage','Orpheline','Transhumance','Achat essaim hiverné','Essaim récupéré (du rucher)','Implentation reine','Marquage de la reine','Visite avec BG','Cadre à mâles','Cadre à mâles (Ajout)','Cadre à mâles (Retrait)','1 cadre','2 cadres','3 cadres','Ajout 1 cadre couvain (division)','Ajout 3 cadres couvain (division)','Ajout 1 cadre bouffe (division)','Retrait 1 cadre couvain (divison)','Retrait 3 cadres couvain (Division)','Retrait 1 cadre bouffe (division)','Retraiit 1 cadre (serrage)','1 cadre (desserrage)','Mise en place portes anti-frelons','Retrait de la porte'],
  variete_miel:    ['Toutes fleurs','Châtaigner','Bonbons','Hydromel'],
  type_pot:        ['Verre','Sachet 170 g','75 Cl Verre'],
  hausse_ref:      ['H01','H02','H03','H04','H05','H06','H07','H08'],
};
const LISTES_KEY = 'ruches_listes';

function getListes() {
  try {
    const saved = JSON.parse(localStorage.getItem(LISTES_KEY));
    if (!saved) return {...LISTES_DEFAULT};
    // Merger : ajouter les clés manquantes depuis LISTES_DEFAULT (nouvelles clés ajoutées après mise à jour)
    return Object.assign({}, LISTES_DEFAULT, saved);
  } catch { return {...LISTES_DEFAULT}; }
}
function saveListes(listes) { localStorage.setItem(LISTES_KEY, JSON.stringify(listes)); }

function renderParamListes() {
  const listes = getListes();
  const LABELS = {
    type_traitement: 'Types de traitement',
    type_nourriture: 'Types de nourriture',
    type_action:     'Actions rucher',
    variete_miel:    'Variétés de miel',
    type_pot:        'Conditionnements',
    hausse_ref:      'Références hausses',
  };
  return Object.entries(LABELS).map(([key, label]) => {
    const values = listes[key] || [];
    return `
    <div class="param-card">
      <div class="param-card-title">${label} <span style="font-weight:400;color:var(--text-muted)">(${values.length})</span></div>
      <div style="margin-bottom:10px">
        ${values.map((v, i) => `
          <div class="param-row" id="liste-row-${key}-${i}">
            <input type="text"
              id="liste-edit-${key}-${i}"
              value="${v.replace(/"/g,'&quot;')}"
              style="flex:1;font-size:13px;background:transparent;border:none;border-bottom:1px solid transparent;color:var(--text);padding:2px 4px;outline:none;min-width:0"
              onfocus="this.style.borderBottomColor='var(--gold)'"
              onblur="this.style.borderBottomColor='transparent';editListeVal('${key}',${i},this.value)"
              onkeydown="if(event.key==='Enter'){this.blur();}if(event.key==='Escape'){this.value='${v.replace(/'/g,"\\'").replace(/"/g,'&quot;')}';this.blur();}">
            <button onclick="removeListeVal('${key}',${i})"
              style="background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:16px;padding:0 6px;flex-shrink:0"
              title="Supprimer">×</button>
          </div>
        `).join('')}
      </div>
      <div style="display:flex;gap:8px">
        <input type="text" id="new-${key}" placeholder="Ajouter une valeur…" style="flex:1;font-size:12px"
          onkeydown="if(event.key==='Enter')addListeVal('${key}')">
        <button class="btn btn-primary" style="font-size:12px;padding:6px 12px" onclick="addListeVal('${key}')">+</button>
      </div>
    </div>`;
  }).join('');
}

function editListeVal(key, idx, newVal) {
  newVal = newVal.trim();
  const listes = getListes();
  const oldVal = listes[key][idx];
  if (!newVal) { toast('La valeur ne peut pas être vide', 'err'); renderParametrage(); return; }
  if (newVal === oldVal) return; // rien changé
  if (listes[key].includes(newVal)) { toast('Valeur déjà présente', 'err'); renderParametrage(); return; }
  listes[key][idx] = newVal;
  saveListes(listes);
  toast(`"${oldVal}" → "${newVal}"`, 'ok');
}

function addListeVal(key) {
  const input = document.getElementById(`new-${key}`);
  const val = input?.value.trim();
  if (!val) return;
  const listes = getListes();
  if (!listes[key]) listes[key] = [];
  if (listes[key].includes(val)) { toast('Valeur déjà présente', 'err'); return; }
  listes[key].push(val);
  saveListes(listes);
  _paramTab = 'listes';
  renderParametrage();
  toast(`"${val}" ajouté`, 'ok');
}

function removeListeVal(key, idx) {
  const listes = getListes();
  if (!listes[key]) return;
  const val = listes[key][idx];
  listes[key].splice(idx, 1);
  saveListes(listes);
  _paramTab = 'listes';
  renderParametrage();
  toast(`"${val}" supprimé`, 'ok');
}

function switchParamTab(tab) {
  _paramTab = tab;
  renderParametrage();
}

const WA_KEY = 'ruches_whatsapp';

function getWhatsAppConfig() {
  try { return JSON.parse(localStorage.getItem(WA_KEY)) || {}; } catch { return {}; }
}

function saveWhatsAppConfig() {
  const cfg = {
    phone:        document.getElementById('wa-phone')?.value.trim() || '',
    apikey:       document.getElementById('wa-apikey')?.value.trim() || '',
    notifStartup: document.getElementById('wa-notif-startup')?.checked || false,
  };
  localStorage.setItem(WA_KEY, JSON.stringify(cfg));
  toast('Configuration WhatsApp enregistrée ✓', 'ok');
  const st = document.getElementById('wa-status');
  if (st) st.textContent = '';
}

function sendWhatsApp(message) {
  const cfg = getWhatsAppConfig();
  if (!cfg.phone || !cfg.apikey) return Promise.reject('Config WhatsApp incomplète');
  return new Promise((resolve) => {
    const url = 'https://api.callmebot.com/whatsapp.php?phone='
      + encodeURIComponent(cfg.phone)
      + '&text=' + encodeURIComponent(message)
      + '&apikey=' + encodeURIComponent(cfg.apikey);
    const img = new Image();
    img.onload = img.onerror = () => resolve();
    img.src = url;
    setTimeout(resolve, 8000);
  });
}

async function testWhatsApp() {
  const st = document.getElementById('wa-status');
  const cfg = {
    phone:  document.getElementById('wa-phone')?.value.trim(),
    apikey: document.getElementById('wa-apikey')?.value.trim(),
  };
  if (!cfg.phone || !cfg.apikey) {
    if (st) { st.textContent = '⚠️ Numéro et clé API requis'; st.style.color = '#e08020'; }
    return;
  }
  if (st) { st.textContent = '⏳ Envoi en cours…'; st.style.color = 'var(--text-muted)'; }
  try {
    await sendWhatsApp('🐝 ApiRuche — Test de notification OK ! Principauté de Cordemais.');
    if (st) { st.textContent = '✅ Message envoyé (vérifiez WhatsApp)'; st.style.color = '#7ab85a'; }
  } catch(e) {
    if (st) { st.textContent = '❌ Erreur : ' + e; st.style.color = '#e06060'; }
  }
}

async function sendWhatsAppAlertes(alertes) {
  const cfg = getWhatsAppConfig();
  if (!cfg.phone || !cfg.apikey || !cfg.notifStartup) return;
  if (!alertes.length) return;

  const lignes = alertes.map(a => {
    let txt = a.emoji + ' *' + a.nom + '* — ' + a.action;
    if (a.label) txt += '\n   ' + a.label;
    return txt;
  });

  const msg = '🐝 *ApiRuche — Alertes rucher*\n'
    + new Date().toLocaleDateString('fr-FR', {weekday:'short', day:'2-digit', month:'2-digit'}) + '\n\n'
    + lignes.join('\n\n');

  try {
    await sendWhatsApp(msg);
    addLog('CREATE', 'actions', 'WhatsApp alertes envoyé (' + alertes.length + ' alerte(s))');
  } catch(e) {
    addLog('CREATE', 'actions', 'WhatsApp ERREUR: ' + e);
  }
}

  const url = document.getElementById('pcfg-url')?.value.trim().replace(/\/$/, '');

async function saveParamRucher(id) {
  const cfg = getConfig();
  if (!cfg.url || !cfg.key) { toast('Configurez Supabase d\'abord', 'err'); return; }
  const nom     = document.getElementById('pr-nom')?.value.trim();
  const adresse = document.getElementById('pr-adresse')?.value.trim();
  try {
    const method = id ? 'PATCH' : 'POST';
    const endpoint = id ? `${cfg.url}/rest/v1/ruchers?id=eq.${id}` : `${cfg.url}/rest/v1/ruchers`;
    const r = await fetch(endpoint, {
      method,
      headers: { apikey: cfg.key, Authorization: `Bearer ${cfg.key}`, 'Content-Type': 'application/json', Prefer: 'return=minimal' },
      body: JSON.stringify({ nom, adresse })
    });
    if (!r.ok) throw new Error(await r.text());
    toast('Rucher enregistré', 'ok');
    await loadData(true);
  } catch(e) { toast('Erreur : ' + e.message, 'err'); }
}

async function saveNouvelleRuche() {
  const cfg = getConfig();
  if (!cfg.url || !cfg.key) { toast('Configurez Supabase d\'abord', 'err'); return; }
  const id   = document.getElementById('pr-new-id')?.value.trim().toUpperCase();
  const nom  = document.getElementById('pr-new-nom')?.value.trim();
  const type = document.getElementById('pr-new-type')?.value;
  if (!id || !nom) { toast('ID et nom obligatoires', 'err'); return; }
  const rucher = DB.ruchers?.[0];
  try {
    const r = await fetch(`${cfg.url}/rest/v1/ruches`, {
      method: 'POST',
      headers: { apikey: cfg.key, Authorization: `Bearer ${cfg.key}`, 'Content-Type': 'application/json', Prefer: 'return=minimal' },
      body: JSON.stringify({ id, nom, type_ruche: type, rucher_id: rucher?.id || null, actif: true })
    });
    if (!r.ok) throw new Error(await r.text());
    toast(`Ruche ${id} créée`, 'ok');
    document.getElementById('pr-new-id').value = '';
    document.getElementById('pr-new-nom').value = '';
    await loadData(true);
    renderParametrage();
  } catch(e) { toast('Erreur : ' + e.message, 'err'); }
}

async function toggleRucheActif(rucheId, actuel) {
  const cfg = getConfig();
  if (!cfg.url || !cfg.key) return;
  const newVal = !actuel;
  try {
    const r = await fetch(`${cfg.url}/rest/v1/ruches?id=eq.${rucheId}`, {
      method: 'PATCH',
      headers: { apikey: cfg.key, Authorization: `Bearer ${cfg.key}`, 'Content-Type': 'application/json', Prefer: 'return=minimal' },
      body: JSON.stringify({ actif: newVal })
    });
    if (!r.ok) throw new Error(await r.text());
    const ruche = DB.ruches.find(r => r.id === rucheId);
    if (ruche) ruche.actif = newVal;
    saveCache();
    renderParametrage();
    toast(`Ruche ${rucheId} ${newVal ? 'activée' : 'désactivée'}`, 'ok');
  } catch(e) { toast('Erreur : ' + e.message, 'err'); }
}

async function saveParamApiculteur(id) {
  const cfg = getConfig();
  if (!cfg.url || !cfg.key) { toast('Configurez Supabase d\'abord', 'err'); return; }
  const data = {
    prenom: document.getElementById('pa-prenom')?.value.trim(),

    napi:   document.getElementById('pa-napi')?.value.trim(),

    email:  document.getElementById('pa-email')?.value.trim(),

  };

      method: 'PATCH',

      body: JSON.stringify(data)
    });
    if (!r.ok) throw new Error(await r.text());
    toast('Fiche apiculteur enregistrée', 'ok');

}

function exportData() {
  const json = JSON.stringify(DB, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `apiruche_export_${todayISO()}.json`;
  a.click();
  toast('Export téléchargé', 'ok');
}

function importData(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      Object.assign(DB, data);
      if (DB.occupations?.length) {
        DB.occupation_courante = DB.occupations.filter(o => !o.date_fin);
      }
      saveCache();
      renderAll();
      toast('Import réussi', 'ok');
    } catch { toast('Fichier JSON invalide', 'err'); }
  };
  reader.readAsText(file);
}

function clearCache() {
  showConfirm('Vider le cache local ? Les données Supabase restent intactes.', () => {
    localStorage.removeItem('ruches_cache');
    localStorage.removeItem('ruches_cache_ts');
    toast('Cache vidé', 'ok');
    loadData(true);
  }, 'Vider', true);
}

async function cloturerColonie(colonieId) {
  const cfg = getConfig();
  if (!cfg.url || !cfg.key) { toast('Configurez Supabase d\'abord', 'err'); return; }
  const dateFin = document.getElementById('cloture-date')?.value;
  if (!dateFin) { toast('Date de fin requise', 'err'); return; }
  showConfirm(`Clôturer cette colonie au ${dateFin} ? Cette action est irréversible.`, async () => {
  try {
    // Mettre à jour colonies.date_fin
    const r1 = await fetch(`${cfg.url}/rest/v1/colonies?id=eq.${colonieId}`, {
      method: 'PATCH',
      headers: { apikey: cfg.key, Authorization: `Bearer ${cfg.key}`, 'Content-Type': 'application/json', Prefer: 'return=minimal' },
      body: JSON.stringify({ date_fin: dateFin })
    });
    if (!r1.ok) throw new Error(await r1.text());

    // Clore l'occupation courante si elle existe
    const occ = DB.occupation_courante.find(o => o.colonie_id === colonieId);
    if (occ) {
      const r2 = await fetch(`${cfg.url}/rest/v1/occupations?colonie_id=eq.${colonieId}&date_fin=is.null`, {
        method: 'PATCH',
        headers: { apikey: cfg.key, Authorization: `Bearer ${cfg.key}`, 'Content-Type': 'application/json', Prefer: 'return=minimal' },
        body: JSON.stringify({ date_fin: dateFin })
      });
      if (!r2.ok) throw new Error(await r2.text());
    }

    toast('Colonie clôturée');
    await loadData(true);
    renderColonieDetail(colonieId);
  } catch(e) {
    toast('Erreur : ' + e.message, 'err');
  }
  });
}

async function deleteOccupation(occId, colonieId) {
  showConfirm("Supprimer cette ligne d'historique ?", async () => {
    const cfg = getConfig();
    try {
      const r = await fetch(cfg.url + '/rest/v1/occupations?id=eq.' + occId, {
        method: 'DELETE',
        headers: { apikey: cfg.key, Authorization: 'Bearer ' + cfg.key }
      });
      if (!r.ok) throw new Error(await r.text());
      DB.occupations = DB.occupations.filter(o => o.id !== occId);
      DB.occupation_courante = DB.occupations.filter(o => !o.date_fin);
      saveCache();
      toast('Ligne supprimée'); addLog('DELETE', 'occupations', 'Suppression occupation');
      renderColonieDetail(colonieId);
    } catch(e) { toast('Erreur : ' + e.message, 'err'); }
  });
}

async function changerRuche(colonieId) {
  const cfg = getConfig();
  if (!cfg.url || !cfg.key) { toast('Configurez Supabase d\'abord', 'err'); return; }
  const nouvelleRucheId = document.getElementById('changer-ruche-select')?.value;
  if (!nouvelleRucheId) { toast('Choisissez une ruche', 'err'); return; }

  const today = todayISO();
  const occ = DB.occupation_courante.find(o => o.colonie_id === colonieId);

  try {
    // 1. Fermer l'occupation courante si elle existe
    if (occ) {
      const r1 = await fetch(`${cfg.url}/rest/v1/occupations?colonie_id=eq.${colonieId}&date_fin=is.null`, {
        method: 'PATCH',
        headers: { apikey: cfg.key, Authorization: `Bearer ${cfg.key}`, 'Content-Type': 'application/json', Prefer: 'return=minimal' },
        body: JSON.stringify({ date_fin: today })
      });
      if (!r1.ok) throw new Error(await r1.text());
    }

    // 2. Créer la nouvelle occupation
    const r2 = await fetch(`${cfg.url}/rest/v1/occupations`, {
      method: 'POST',
      headers: { apikey: cfg.key, Authorization: `Bearer ${cfg.key}`, 'Content-Type': 'application/json', Prefer: 'return=minimal' },
      body: JSON.stringify({ id: genId(), colonie_id: colonieId, ruche_id: nouvelleRucheId, date_debut: today, date_fin: null })
    });
    if (!r2.ok) throw new Error(await r2.text());

    toast('Colonie déplacée ✓', 'ok');
    const _c = DB.colonies.find(x => x.id === colonieId); addLog('UPDATE', 'occupations', `${_c ? _c.nom : colonieId} → ${nouvelleRucheId}`);
    await loadData(true);
    renderColonieDetail(colonieId);
  } catch(e) {
    toast('Erreur : ' + e.message, 'err');
  }
}

async function toggleCadreMales(rucheId) {
  const cfg = getConfig();
  if (!cfg.url || !cfg.key) return;
  const ruche = DB.ruches.find(r => r.id === rucheId);
  if (!ruche) return;

function navigateColonie(dir) {
  const cols = [...DB.colonies].sort((a,b) => (a.nom||'').localeCompare(b.nom||''));
  const idx = cols.findIndex(c => c.id === window._currentColonieId);
  if (idx === -1) return;
  const newIdx = (idx + dir + cols.length) % cols.length;
  const c = cols[newIdx];
  window._currentColonieId = c.id;
  document.getElementById('header-title').textContent = c.nom || 'Colonie';
  renderColonieDetail(c.id);
  document.getElementById('content').scrollTop = 0;
}

function setGentillesse(prefix, val) {
  document.getElementById(prefix + '-gentillesse').value = val;
  const label = document.getElementById(prefix + '-gentillesse-label');
  if (label) label.textContent = val + '/5';
  for (let i = 1; i <= 5; i++) {
    const circle = document.getElementById(prefix + '-star-' + i);
    if (circle) circle.setAttribute('fill', i <= val ? '#c8a84b' : '#3a3a20');
  }
}

async function setGentillesseColonie(colonieId, val) {
  const cfg = getConfig();
  if (!cfg.url || !cfg.key) return;
  try {
    const r = await fetch(cfg.url + '/rest/v1/colonies?id=eq.' + colonieId, {
      method: 'PATCH',
      headers: { apikey: cfg.key, Authorization: 'Bearer ' + cfg.key, 'Content-Type': 'application/json', Prefer: 'return=minimal' },
      body: JSON.stringify({ gentillesse: val })
    });
    if (!r.ok) throw new Error(await r.text());
    // Mettre à jour en local
    const col = DB.colonies.find(c => c.id === colonieId);
    if (col) col.gentillesse = val;
    // Rafraîchir les étoiles sans recharger toute la page
    const container = document.getElementById('gent-stars-' + colonieId);
    if (container) {
      const svgs = container.querySelectorAll('svg');
      svgs.forEach((svg, i) => {
        svg.querySelector('circle').setAttribute('fill', i < val ? '#c8a84b' : '#3a3a20');
      });
      const span = container.querySelector('span');
      if (span) span.textContent = val + '/5';
    }
    toast('Gentillesse mise à jour'); addLog('UPDATE', 'colonies', 'Gentillesse ' + val + '/5');
  } catch(e) {
    toast('Erreur : ' + e.message, 'err');
  }
}

async function saveNouvelleColonie() {
  const cfg = getConfig();
  if (!cfg.url || !cfg.key) { toast('Configurez Supabase d\'abord', 'err'); showSettings(); return; }
  const nom = document.getElementById('nc-nom')?.value?.trim();
  if (!nom) { toast('Le nom est obligatoire', 'err'); return; }

  const id = genId();
  const colonie = {
    id,
    nom,
    date_creation: document.getElementById('nc-date')?.value || null,
    genetique: document.getElementById('nc-genetique')?.value?.trim() || null,
    couleur_reine: document.getElementById('nc-couleur')?.value || null,
    marquee: document.getElementById('nc-marquee')?.value === 'true',
    gentillesse: parseFloat(document.getElementById('nc-gentillesse')?.value) || null,
  };

  try {
    const r = await fetch(`${cfg.url}/rest/v1/colonies`, {
      method: 'POST',
      headers: { apikey: cfg.key, Authorization: `Bearer ${cfg.key}`, 'Content-Type': 'application/json', Prefer: 'return=minimal' },
      body: JSON.stringify(colonie)
    });
    if (!r.ok) throw new Error(await r.text());

    // Installer dans la ruche si choisie
    const rucheId = document.getElementById('nc-ruche')?.value;
    if (rucheId) {
      const occ = { id: genId(), colonie_id: id, ruche_id: rucheId, date_debut: colonie.date_creation || todayISO(), date_fin: null };
      await fetch(`${cfg.url}/rest/v1/occupations`, {
        method: 'POST',
        headers: { apikey: cfg.key, Authorization: `Bearer ${cfg.key}`, 'Content-Type': 'application/json', Prefer: 'return=minimal' },
        body: JSON.stringify(occ)
      });
    }

    toast('Colonie créée !'); addLog('CREATE', 'colonies', 'Nouvelle colonie : ' + nom);
    await loadData(true);
    navigate('colonies');
  } catch(e) {
    toast('Erreur : ' + e.message, 'err');
  }
}

            <input type="date" id="date-cadre-males" value="${ruche.date_cadre_males || ''}"
              onchange="saveDateCadreMales('${ruche.id}')"

    <!-- Remérage / Division -->
    <div class="fiche-section" style="padding-top:0">
      <div class="fiche-card">
        ${(() => {
          const diff = ruche.date_remerage_division ? Math.floor((new Date() - new Date(ruche.date_remerage_division)) / 86400000) : 0;
          const actif = !!ruche.remerage_division;
          const btnStyle = actif
            ? (diff >= 28
              ? 'background:#3a8a3a;border-color:#3a8a3a;color:white;'
              : diff >= 15
                ? 'background:#b87020;border-color:#b87020;color:white;'
                : 'background:#a03030;border-color:#a03030;color:white;')
            : 'background:transparent;border-color:var(--border);color:var(--text-dim);';
          const nbJours = actif && ruche.date_remerage_division
            ? (diff >= 28
              ? `<span style="font-size:11px;font-weight:600;color:#7ab85a">${diff}j ✓</span>`
              : diff >= 15
                ? `<span style="font-size:11px;font-weight:600;color:#e08020">${diff}j</span>`
                : `<span style="font-size:11px;font-weight:600;color:#c04040">${diff}j</span>`)
            : '';
          return `
          <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
            <button onclick="toggleRemerageDiv('${ruche.id}')"

              👑 Remérage/Division ${actif ? '· Actif' : '· Inactif'}

            <input type="date" id="date-remerage-div" value="${ruche.date_remerage_division || ''}"
              onchange="saveDateRemerageDiv('${ruche.id}')"
              style="font-size:12px;flex:1;min-width:130px">
          </div>`;
        })()}
      </div>
    </div>

    <!-- Dernières pesées -->
    ${pesees.length ? `
    <div class="fiche-section" style="padding-top:0">
      <div class="fiche-section-title">Dernières pesées</div>
      <div class="fiche-card" style="padding-bottom:8px">
        ${(() => {
          const vals = pesees.map(p => p.pesee ? parseFloat(p.pesee) : p.demi_pesee ? p.demi_pesee * 2 : null).filter(v => v !== null).reverse();
          const W = 300, H = 70, padX = 8, padY = 14;
          const minV = Math.min(...vals) * 0.97;
          const maxV = Math.max(...vals) * 1.03;
          const range = maxV - minV || 1;
          const xs = vals.map((_, i) => padX + i * (W - padX*2) / Math.max(vals.length - 1, 1));
          const ys = vals.map(v => H - padY - (v - minV) / range * (H - padY*2));
          const pts = xs.map((x, i) => `${x},${ys[i]}`).join(' ');
          const area = `${xs[0]},${H} ` + pts + ` ${xs[xs.length-1]},${H}`;
          const peseesSorted = pesees.slice().reverse();
          const dots = vals.map((v, i) => {
            const isLast = i === vals.length - 1;
            const col = couleurPoidsCadre(v, peseesSorted[i]?.nb_cadres);
            return `
              <circle cx="${xs[i]}" cy="${ys[i]}" r="${isLast ? 3 : 2}" fill="${col}" opacity="${isLast ? 1 : 0.7}"/>
              ${isLast ? `<text x="${xs[i]}" y="${ys[i]-6}" text-anchor="middle" font-size="8" font-weight="600" fill="${col}">${v.toFixed(1)}</text>` : ''}
            `;
          }).join('');
          const labels = peseesSorted.map((p, i) => {
            const isLast = i === vals.length - 1;
            return `<text x="${xs[i]}" y="${H+11}" text-anchor="middle" font-size="${isLast ? 8 : 7}" fill="rgba(255,255,255,${isLast ? '.5' : '.25'})">${fmtDate(p.semaine).slice(0,5)}</text>`;
          }).join('');
          return `<svg viewBox="0 0 ${W} ${H+16}" style="width:100%;overflow:visible;display:block;margin-bottom:6px">
            <defs>
              <linearGradient id="grad-pesee" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stop-color="#c8a84b" stop-opacity="0.15"/>
                <stop offset="100%" stop-color="#c8a84b" stop-opacity="0"/>
              </linearGradient>
            </defs>
            <polygon points="${area}" fill="url(#grad-pesee)"/>
            <polyline points="${pts}" fill="none" stroke="#c8a84b" stroke-width="1" stroke-linejoin="round" stroke-linecap="round" opacity="0.8"/>
            ${dots}
            ${labels}
          </svg>`;
        })()}
        ${pesees.map(p => `
          <div class="historique-item">
            <div>
              <div class="historique-label">${fmtDate(p.semaine)}</div>
              ${p.nb_cadres ? `<div style="font-size:10px;color:var(--text-muted)">${p.nb_cadres} cadres · ${p.nb_hausse || 0} hausse(s)</div>` : ''}
            </div>
            <div style="display:flex;align-items:center;gap:10px">
              <div style="text-align:right">
                <div class="historique-val">${p.pesee ? parseFloat(p.pesee).toFixed(1) : (p.demi_pesee ? (p.demi_pesee*2).toFixed(1) : '—')} kg</div>
                ${p.ratio ? `<div style="font-size:10px;color:var(--text-muted)">${parseFloat(p.ratio).toFixed(2)} kg/cadre</div>` : ''}
              </div>
              <button onclick="deletePesee('${p.id}','${rucheId}')"
                style="background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:15px;padding:4px 2px;line-height:1;flex-shrink:0"
                title="Supprimer cette pesée">🗑️</button>
            </div>
          </div>
        `).join('')}
      </div>
    </div>` : ''}

    <!-- Traitements & Nourrissements -->
    ${(traitements.length || nourritures.length) ? `
    <div class="fiche-section" style="padding-top:0">
      <div class="fiche-section-title">Traitements & Nourrissements</div>
      <div class="fiche-card">
        ${traitements.map(t => `
          <div class="historique-item">
            <div>
              <div class="historique-label">💊 ${t.type_traitement}</div>
              ${t.date_fin ? `<div style="font-size:10px;color:var(--text-muted)">Fin : ${fmtDate(t.date_fin)}</div>` : ''}
            </div>
            <div class="historique-date">${fmtDate(t.semaine)}</div>
          </div>
        `).join('')}
        ${nourritures.map(n => `
          <div class="historique-item">
            <div>
              <div class="historique-label">🍽️ ${n.type_nourriture}</div>
            </div>
            <div style="text-align:right">
              ${n.quantite ? `<div class="historique-val" style="font-size:14px">${n.quantite} kg</div>` : ''}
              <div class="historique-date">${fmtDate(n.semaine)}</div>
            </div>
          </div>
        `).join('')}
      </div>
    </div>` : ''}

    <!-- Comptages varroa -->
    ${varroas.length ? `
    <div class="fiche-section" style="padding-top:0">
      <div class="fiche-section-title">Comptages Varroa</div>
      <div class="fiche-card">
        ${varroas.map(v => `
          <div class="historique-item">
            <div>
              <div class="historique-label">${v.methode} · ${v.phase || '—'}</div>
            </div>
            <div style="text-align:right">
              <div class="historique-val" style="font-size:14px">${v.nb_varroas ?? '—'} varroas</div>
              <div class="historique-date">${fmtDate(v.date_comptage)}</div>
            </div>
          </div>
        `).join('')}
      </div>
    </div>` : ''}

    <!-- Actions -->
    ${actionsRuche.length ? `
    <div class="fiche-section" style="padding-top:0">
      <div class="fiche-section-title">Actions</div>
      <div class="fiche-card">
        ${actionsRuche.map(a => `
          <div class="historique-item">
            <div class="historique-label">🫱 ${a.action}</div>
            <div style="display:flex;align-items:center;gap:8px">
              <div class="historique-date">${fmtDate(a.semaine)}</div>
              <button onclick="deleteAction('${a.id}','ruche-detail','${rucheId}')"
                style="background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:15px;padding:2px 0;line-height:1"
                title="Supprimer">🗑️</button>
            </div>
          </div>
        `).join('')}
      </div>
    </div>` : ''}

    <!-- Historique colonies -->
    ${occupations.length ? `
    <div class="fiche-section" style="padding-top:0">
      <div class="fiche-section-title">Historique colonies</div>
      <div class="fiche-card">
        ${occupations.map(o => {
          const c = DB.colonies.find(c => c.id === o.colonie_id);
          return `
          <div class="historique-item">
            <div>
              <div class="historique-label">${c?.nom || o.colonie_id}</div>
              <div style="font-size:10px;color:var(--text-muted)">${fmtDate(o.date_debut)} → ${o.date_fin ? fmtDate(o.date_fin) : 'aujourd\'hui'}</div>
            </div>
            ${!o.date_fin ? '<span class="tag tag-green">Active</span>' : '<span class="tag tag-muted">Terminée</span>'}
          </div>`;
        }).join('')}
      </div>
    </div>` : ''}

    <div style="height:16px"></div>
  `;
}

function navigateRuche(dir) {
  const ruches = DB.ruches.filter(r => r.actif !== false);
  const idx = ruches.findIndex(r => r.id === window._currentRucheId);
  if (idx === -1) return;
  const newIdx = (idx + dir + ruches.length) % ruches.length;
  const r = ruches[newIdx];
  window._currentRucheId = r.id;
  document.getElementById('header-title').textContent = r.nom;
  renderRucheDetail(r.id);
  document.getElementById('content').scrollTop = 0;
}

function navigateAction(screen, rucheId) {
  window._currentRucheId = rucheId;
  navigate(screen);
  // Pré-sélectionner la ruche dans le formulaire
  setTimeout(() => {
    const sel = document.getElementById(`f-${screen}-ruche`);
    if (sel) {
      sel.value = rucheId;
      updateColonieSelect(screen);
      updateRucheThumb(`f-${screen}-ruche`);
      if (screen === 'pesee') updatePeseeRuchePhoto();
    }
  }, 50);
}

// SYSTÈME DE LOGS
// ============================================================
const LOGS_KEY = 'ruches_logs';
const LOGS_MAX = 500;

const LOG_LABELS = {
  pesees: 'Pesée', nourrissements: 'Nourrissement', traitements: 'Traitement',
  actions: 'Action', comptages_varroa: 'Varroa', recoltes: 'Récolte',
  conditionnements: 'Conditionnement', achats: 'Achat', pieges_frelons: 'Piège frelon',
  colonies: 'Colonie', occupations: 'Occupation', ruches: 'Ruche', hausses: 'Hausse',
};

function addLog(action, table, detail = '') {
  try {
    const logs = getLogs();
    logs.unshift({
      ts: new Date().toISOString(),
      action, // 'CREATE' | 'UPDATE' | 'DELETE'
      table,
      label: LOG_LABELS[table] || table,
      detail
    });
    localStorage.setItem(LOGS_KEY, JSON.stringify(logs.slice(0, LOGS_MAX)));
  } catch(e) {}
}

function getLogs() {
  try { return JSON.parse(localStorage.getItem(LOGS_KEY)) || []; } catch(e) { return []; }
}

function renderLogs() {
  const el = document.getElementById('content-logs');
  if (!el) return;
  const logs = getLogs();
  const colAction = { CREATE: '#7ab85a', UPDATE: '#e08020', DELETE: '#e06060' };
  const iconAction = { CREATE: '➕', UPDATE: '✏️', DELETE: '🗑' };

  function buildTable(filtered) {
    if (!filtered.length) return '<div style="text-align:center;padding:30px;color:var(--text-muted);font-size:13px">Aucune entrée correspondante</div>';
    return filtered.map(l => {
      const d = new Date(l.ts);
      const dateStr = d.toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit',year:'2-digit'})
        + ' ' + d.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
      const col = colAction[l.action] || 'var(--text-muted)';
      return '<div style="display:grid;grid-template-columns:70px 1fr 110px;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border-soft)">'
        + '<span style="display:inline-flex;align-items:center;gap:4px;padding:2px 7px;border-radius:5px;background:'+col+'22;color:'+col+';font-size:10px;font-weight:700;white-space:nowrap">'+(iconAction[l.action]||'')+' '+l.action+'</span>'
        + '<div><div style="font-size:12px;color:var(--text);font-weight:600">'+l.label+(l.detail?'<span style=\'font-weight:400;color:var(--text-muted)\'>  · '+l.detail+'</span>':'')+'</div></div>'
        + '<div style="text-align:right;font-size:10px;color:var(--text-muted)">'+dateStr+'</div>'
        + '</div>';
    }).join('');
  }

  el.innerHTML = '<div class="form-card">'
    + '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">'
    + '<div style="font-family:DM Serif Display,serif;font-size:18px;color:var(--gold)">🔍 Journal</div>'
    + '<div style="display:flex;gap:6px">'
    + '<button class="btn btn-secondary" style="font-size:11px;padding:5px 10px" onclick="exportLogs()">⬇️ Export CSV</button>'
    + '<button class="btn" style="font-size:11px;padding:5px 10px;background:rgba(160,48,48,.15);color:#e06060;border:1px solid rgba(160,48,48,.3)" onclick="clearLogs()">🗑 Vider</button>'
    + '</div></div>'

    // Stats
    + '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px">'
    + ['CREATE','UPDATE','DELETE'].map(a => {
        const nb = logs.filter(l => l.action === a).length;
        const col = colAction[a];
        return '<div style="background:'+col+'11;border:1px solid '+col+'33;border-radius:8px;padding:8px;text-align:center">'
          +'<div style="font-family:DM Serif Display,serif;font-size:20px;color:'+col+'">'+nb+'</div>'
          +'<div style="font-size:10px;color:var(--text-muted)">'+(iconAction[a]||'')+' '+a+'</div></div>';
      }).join('')
    + '</div>'

    // Filtres
    + '<div style="display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap">'
    + '<input id="logs-search" type="text" placeholder="🔍 Rechercher…" oninput="filterLogs()" style="flex:1;min-width:120px;padding:6px 10px;border-radius:8px;border:1px solid var(--border);background:var(--bg-card);color:var(--text);font-size:12px">'
    + '<select id="logs-filter-action" onchange="filterLogs()" style="padding:6px 8px;border-radius:8px;border:1px solid var(--border);background:var(--bg-card);color:var(--text);font-size:12px">'
    + '<option value="">Tous types</option><option>CREATE</option><option>UPDATE</option><option>DELETE</option></select>'
    + '<select id="logs-filter-table" onchange="filterLogs()" style="padding:6px 8px;border-radius:8px;border:1px solid var(--border);background:var(--bg-card);color:var(--text);font-size:12px">'
    + '<option value="">Toutes tables</option>'
    + [...new Set(logs.map(l => l.label))].sort().map(lab => '<option>'+lab+'</option>').join('')
    + '</select></div>'

    // Compteur
    + '<div id="logs-count" style="font-size:11px;color:var(--text-muted);margin-bottom:8px">'+logs.length+' entrée(s)</div>'

    // Table
    + '<div id="logs-table" style="overflow-y:auto;max-height:58vh">'
    + buildTable(logs)
    + '</div></div>';

  window._logsData = logs;
}

function filterLogs() {
  const search = (document.getElementById('logs-search')?.value || '').toLowerCase();
  const action = document.getElementById('logs-filter-action')?.value || '';
  const label  = document.getElementById('logs-filter-table')?.value || '';
  const logs   = window._logsData || getLogs();
  const filtered = logs.filter(l => {
    if (action && l.action !== action) return false;
    if (label  && l.label  !== label)  return false;
    if (search && !((l.label + ' ' + (l.detail||'')).toLowerCase().includes(search))) return false;
    return true;
  });
  const colAction = { CREATE: '#7ab85a', UPDATE: '#e08020', DELETE: '#e06060' };
  const iconAction = { CREATE: '➕', UPDATE: '✏️', DELETE: '🗑' };
  const tableEl = document.getElementById('logs-table');
  const countEl = document.getElementById('logs-count');
  if (!tableEl) return;
  if (!filtered.length) {
    tableEl.innerHTML = '<div style="text-align:center;padding:30px;color:var(--text-muted);font-size:13px">Aucune entrée correspondante</div>';
    if (countEl) countEl.textContent = '0 entrée(s)';
    return;
  }
  tableEl.innerHTML = filtered.map(l => {
    const d = new Date(l.ts);
    const dateStr = d.toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit',year:'2-digit'})
      + ' ' + d.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
    const col = colAction[l.action] || 'var(--text-muted)';
    return '<div style="display:grid;grid-template-columns:70px 1fr 110px;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border-soft)">'
      + '<span style="display:inline-flex;align-items:center;gap:4px;padding:2px 7px;border-radius:5px;background:'+col+'22;color:'+col+';font-size:10px;font-weight:700;white-space:nowrap">'+(iconAction[l.action]||'')+' '+l.action+'</span>'
      + '<div><div style="font-size:12px;color:var(--text);font-weight:600">'+l.label+(l.detail?'<span style=\'font-weight:400;color:var(--text-muted)\'>  · '+l.detail+'</span>':'')+'</div></div>'
      + '<div style="text-align:right;font-size:10px;color:var(--text-muted)">'+dateStr+'</div>'
      + '</div>';
  }).join('');
  if (countEl) countEl.textContent = filtered.length + ' entrée(s)';
}

function renderLogsHtml() {
  const logs = getLogs();
  if (!logs.length) return '<div style="text-align:center;padding:20px;color:var(--text-muted);font-size:13px">Aucun log enregistré</div>';
  const colAction = { CREATE: '#7ab85a', UPDATE: '#e08020', DELETE: '#e06060' };
  const iconAction = { CREATE: '➕', UPDATE: '✏️', DELETE: '🗑' };
  return logs.map(l => {
    const d = new Date(l.ts);
    const dateStr = d.toLocaleDateString('fr-FR', {day:'2-digit',month:'2-digit',year:'2-digit'})
      + ' ' + d.toLocaleTimeString('fr-FR', {hour:'2-digit',minute:'2-digit',second:'2-digit'});
    const col = colAction[l.action] || 'var(--text-muted)';
    return '<div style="display:flex;align-items:flex-start;gap:8px;padding:7px 0;border-bottom:1px solid var(--border-soft)">'
      + '<span style="flex-shrink:0;padding:1px 6px;border-radius:4px;background:' + col + '22;color:' + col + ';font-size:10px;font-weight:700;margin-top:1px">' + (iconAction[l.action]||'') + ' ' + l.action + '</span>'

      + '<div style="font-size:10px;color:var(--text-muted);margin-top:1px">' + dateStr + '</div>'

function clearLogs() {
  showConfirm("Vider tout le journal des actions ?", () => {
    localStorage.removeItem(LOGS_KEY);
    window._logsData = [];
    const screen = document.getElementById('screen-logs');
    if (screen && screen.classList.contains('active')) renderLogs();
    toast('Logs vidés');
  });
}

function exportLogs() {
  const logs = getLogs();
  const csv = ['Date,Action,Table,Détail']
    .concat(logs.map(l => [new Date(l.ts).toLocaleString('fr-FR'), l.action, l.label, l.detail || ''].map(v => '"'+v+'"').join(',')))
    .join('\n');
  const a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
  a.download = 'logs_ruches_' + new Date().toISOString().slice(0,10) + '.csv';
  a.click();
}

async function saveRecord(table, record, successMsg) {
  const cfg = getConfig();
  try {
    const r = await fetch(`${cfg.url}/rest/v1/${table}`, {
      method: 'POST',
      headers: { apikey: cfg.key, Authorization: `Bearer ${cfg.key}`, 'Content-Type': 'application/json', Prefer: 'return=minimal' },
      body: JSON.stringify(record)
    });
    if (r.ok || r.status === 201) {
      if (DB[table] !== undefined) DB[table].unshift(record);
      saveCache();
      toast(successMsg, 'ok');
      addLog('CREATE', table, successMsg.replace(' ✓','').replace('✓','').trim());
      return true;
    } else {
      const e = await r.json();
      toast(`Erreur: ${e.message}`, 'err');
      addLog('CREATE', table, 'ERREUR: ' + (e.message || ''));
      return false;
    }
  } catch(e) { toast(`Erreur: ${e.message}`, 'err'); return false; }
}

function genId() {
  return ([1e7]+-1e3+-4e3+-8e3+-1e11).replace(/[018]/g, c =>
    (c ^ crypto.getRandomValues(new Uint8Array(1))[0] & 15 >> c / 4).toString(16));
}

function fmtDate(d) {
  if (!d) return '—';
  try {
    const dt = new Date(d);
    return dt.toLocaleDateString('fr-FR', { day: '2-digit', month: '2-digit', year: '2-digit' });
  } catch { return d; }
}

function showConfirm(message, onOk, labelOk = 'Confirmer', danger = true) {
  const overlay = document.getElementById('confirm-overlay');
  document.getElementById('confirm-message').textContent = message;
  const btnOk = document.getElementById('confirm-ok');
  const btnCancel = document.getElementById('confirm-cancel');
  btnOk.textContent = labelOk;
  btnOk.style.background = danger ? '#a03030' : 'var(--gold)';
  btnOk.style.borderColor = danger ? '#a03030' : 'var(--gold)';
  btnOk.style.color = 'white';
  overlay.style.display = 'flex';
  const close = () => { overlay.style.display = 'none'; };
  btnOk.onclick = () => { close(); onOk(); };
  btnCancel.onclick = close;
  overlay.onclick = (e) => { if (e.target === overlay) close(); };
}

function toast(msg, type = '') {
  const c = document.getElementById('toast-container');
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  t.textContent = msg;
  c.appendChild(t);
  setTimeout(() => { t.style.opacity = '0'; t.style.transition = 'opacity .3s'; setTimeout(() => t.remove(), 300); }, 2800);
}


// ============================================================
// UPLOAD PHOTO RUCHE
// ============================================================
let currentPhotoRucheId = null;
let currentPhotoFile = null;

function openPhotoUpload(rucheId) {
  currentPhotoRucheId = rucheId;
  currentPhotoFile = null;
  const ruche = DB.ruches.find(r => r.id === rucheId);
  document.getElementById('photo-sheet-title').textContent = `📷 ${ruche ? ruche.nom : rucheId}`;
  document.getElementById('photo-preview').className = 'photo-preview';
  document.getElementById('photo-preview').src = '';
  document.getElementById('photo-upload-hint').style.display = 'block';
  document.getElementById('photo-save-btn').disabled = true;
  document.getElementById('photo-status').textContent = '';
  document.getElementById('photo-input').value = '';
  document.getElementById('photo-overlay').classList.add('open');
  document.getElementById('photo-sheet').classList.add('open');
}

function closePhotoUpload() {
  document.getElementById('photo-overlay').classList.remove('open');
  document.getElementById('photo-sheet').classList.remove('open');
}

function previewPhoto(input) {
  const file = input.files[0];
  if (!file) return;
  currentPhotoFile = file;
  const reader = new FileReader();
  reader.onload = e => {
    const preview = document.getElementById('photo-preview');
    preview.src = e.target.result;
    preview.className = 'photo-preview visible';
    document.getElementById('photo-upload-hint').style.display = 'none';
    document.getElementById('photo-save-btn').disabled = false;
  };
  reader.readAsDataURL(file);
}

async function uploadPhoto() {
  if (!currentPhotoFile || !currentPhotoRucheId) return;
  const cfg = getConfig();
  if (!cfg.url || !cfg.key) { toast('Configurez Supabase d\'abord', 'err'); return; }

  const btn = document.getElementById('photo-save-btn');
  const status = document.getElementById('photo-status');
  btn.disabled = true;
  status.textContent = '⏳ Upload en cours…';

  try {
    // Nom du fichier : ruche_id + extension
    const ext = currentPhotoFile.name.split('.').pop().toLowerCase() || 'jpg';
    const fileName = `${currentPhotoRucheId}.${ext}`;

    // Upload vers Supabase Storage
    const r = await fetch(`${cfg.url}/storage/v1/object/ruches-images/${fileName}`, {
      method: 'POST',
      headers: {
        apikey: cfg.key,
        Authorization: `Bearer ${cfg.key}`,
        'Content-Type': currentPhotoFile.type,
        'x-upsert': 'true'   // écrase si existe déjà
      },
      body: currentPhotoFile
    });

    if (!r.ok) {
      const e = await r.json();
      throw new Error(e.message || r.status);
    }

    // Mettre à jour photo_url dans la table ruches
    const photoUrl = fileName; // on stocke juste le nom, l'URL complète est construite à l'affichage
    const r2 = await fetch(`${cfg.url}/rest/v1/ruches?id=eq.${currentPhotoRucheId}`, {
      method: 'PATCH',
      headers: {
        apikey: cfg.key,
        Authorization: `Bearer ${cfg.key}`,
        'Content-Type': 'application/json',
        Prefer: 'return=minimal'
      },
      body: JSON.stringify({ photo_url: fileName })
    });

    if (!r2.ok) throw new Error('Mise à jour ruche échouée');

    // Mettre à jour le cache local
    const ruche = DB.ruches.find(r => r.id === currentPhotoRucheId);
    if (ruche) ruche.photo_url = fileName;
    saveCache();

    toast('Photo enregistrée ✓', 'ok');
    closePhotoUpload();
    renderRuches();

  } catch(e) {
    status.textContent = `❌ ${e.message}`;
    status.style.color = '#e07070';
    btn.disabled = false;
  }
}
